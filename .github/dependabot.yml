version: 2
updates:
  - package-ecosystem: pip
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    groups:
      python-runtime:
        patterns: ["anthropic", "flask", "gunicorn", "requests", "pdfplumber", "python-dotenv"]
      python-dev:
        patterns: ["pytest*", "responses", "freezegun", "ruff"]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
