name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  gitleaks:
    name: gitleaks (credential scan)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Run gitleaks
        run: |
          set -euo pipefail
          GITLEAKS_VERSION="8.21.2"
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | tar -xz -C /tmp gitleaks
          /tmp/gitleaks detect \
            --no-banner \
            --redact \
            --verbose \
            --source .

  sensitive-patterns:
    name: Sensitive substring scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v7
        with:
          python-version: '3.11'
      - name: Scan tracked tree against private pattern list
        env:
          # Populated from the repository's GitHub Actions secret. Empty
          # in fork-originated PRs (GitHub redacts secrets in those),
          # in which case the script no-ops with a notice.
          SENSITIVE_PATTERNS: ${{ secrets.SENSITIVE_PATTERNS }}
        run: python Scripts/check_sensitive_patterns.py --all
