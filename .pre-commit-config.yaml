repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.7.4
    hooks:
      - id: ruff
        args: [--fix]
        files: ^(agent|tests)/
      - id: ruff-format
        files: ^(agent|tests)/

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        exclude: \.md$
      - id: end-of-file-fixer
        exclude: \.(excalidraw|json)$
      - id: check-yaml
      - id: check-toml
      - id: check-added-large-files
        args: [--maxkb=500]
      - id: detect-private-key

  # Credential scanner — catches API keys, tokens, certificates that
  # GitHub's built-in push protection might miss (broader pattern set).
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks

  # Operator-defined sensitive substrings (PHI, Azure resource names,
  # personal emails, etc.). The pattern list itself is NEVER in the repo
  # — see scripts/check_sensitive_patterns.py for source resolution.
  - repo: local
    hooks:
      - id: block-sensitive-staged
        name: Block sensitive patterns (staged content)
        entry: python scripts/check_sensitive_patterns.py --staged
        language: system
        pass_filenames: false
        stages: [pre-commit]
        always_run: true
      - id: block-sensitive-tree
        name: Block sensitive patterns (full tree, pre-push)
        entry: python scripts/check_sensitive_patterns.py --all
        language: system
        pass_filenames: false
        stages: [pre-push]
        always_run: true
